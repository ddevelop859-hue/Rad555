<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tanson Platinum</title>
    <style>
        :root { --neon: #00ffe1; --pink: #ff00ff; --gold: #c69c6d; --bg: #050510; }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; height: 100vh; overflow: hidden; }
        
        /* ЗАСТАВКА СО ЛЬВОМ */
        #splash { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 0.5s; }
        #splash img { width: 150px; opacity: 0.8; filter: drop-shadow(0 0 15px rgba(198, 156, 109, 0.3)); animation: pulse 2s infinite; }
        .loader-bar { width: 180px; height: 2px; background: #111; border-radius: 2px; margin-top: 20px; }
        .loader-fill { width: 0%; height: 100%; background: var(--gold); animation: load 2.5s forwards; }
        @keyframes load { to { width: 100%; } }
        @keyframes pulse { 0% { opacity: 0.6; } 50% { opacity: 0.9; } 100% { opacity: 0.6; } }

        /* ОСНОВНОЙ ИНТЕРФЕЙС */
        #main-app { display: none; height: 100vh; flex-direction: column; }
        .header { background: #000; padding: 12px 15px; border-bottom: 1px solid #111; display: flex; justify-content: space-between; align-items: center; }
        
        .screen { display: none; flex: 1; overflow-y: auto; padding-bottom: 80px; }
        .screen.active { display: flex; flex-direction: column; }

        /* СООБЩЕНИЯ (Как на скриншотах) */
        #chat-window { flex: 1; padding: 15px; display: flex; flex-direction: column; gap: 12px; overflow-y: auto; }
        .msg { padding: 12px; border-radius: 18px; max-width: 75%; background: #1a1a25; border: 1px solid #222; position: relative; }
        .msg.me { align-self: flex-end; border-color: var(--neon); background: rgba(0,255,225,0.05); }
        .msg-info { font-size: 10px; color: var(--neon); margin-bottom: 4px; font-weight: bold; }

        /* ВВОД СООБЩЕНИЯ */
        .input-area { background: #000; padding: 10px; display: flex; align-items: center; gap: 10px; border-top: 1px solid #111; position: sticky; bottom: 70px; z-index: 10; }
        #m-inp { flex: 1; background: #111; border: 1px solid #222; color: #fff; padding: 12px 18px; border-radius: 25px; outline: none; }

        /* НАВИГАЦИЯ */
        .nav-bar { height: 70px; background: #000; border-top: 1px solid #111; display: flex; justify-content: space-around; align-items: center; }
        .nav-btn { background: none; border: none; color: #444; font-size: 11px; display: flex; flex-direction: column; align-items: center; gap: 5px; }
        .nav-btn.active { color: var(--neon); }
        .nav-btn i { font-size: 22px; font-style: normal; }

        /* МОДАЛЬНЫЕ ОКНА */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .modal-box { background: #0a0a15; padding: 25px; border-radius: 24px; border: 1px solid #222; width: 85%; }
        .btn-opt { width: 100%; padding: 14px; margin: 8px 0; background: #111; border: 1px solid #222; color: #fff; border-radius: 12px; text-align: left; }
    </style>
</head>
<body>

<div id="splash">
    <img src="https://i.ibb.co/LzfM5mC/lion-logo.png" onerror="this.src='https://img.icons8.com/ios-filled/150/c69c6d/lion.png'" alt="Lion">
    <div class="loader-bar"><div class="loader-fill"></div></div>
</div>

<div id="main-app">
    <div id="scr-chats" class="screen active">
        <div class="header">
            <div style="display:flex; align-items:center; gap:10px;">
                <b style="color:var(--neon); letter-spacing:1px;">TANSON</b>
                <button onclick="toggleRadio()" id="radio-btn" style="background:none; border:none; font-size:18px;">📻</button>
            </div>
            <button onclick="openModal('sett-modal')" style="background:none; border:none; color:#666; font-size:20px;">⚙️</button>
        </div>
        <div style="padding:15px;">
            <div onclick="openChat('Общий Чат')" style="background:rgba(255,255,255,0.03); padding:20px; border-radius:18px; border:1px solid #222; display:flex; align-items:center; gap:15px;">
                <span style="font-size:24px;">🌍</span>
                <div>
                    <b>Общий Чат</b><br>
                    <small style="color:#555;">Все пользователи здесь</small>
                </div>
            </div>
        </div>
    </div>

    <div id="scr-profile" class="screen">
        <div class="header"><b>Мой Профиль</b></div>
        <div style="text-align:center; padding:30px;">
            <div onclick="document.getElementById('f-up').click()" style="width:110px; height:110px; border-radius:50%; background:var(--neon); margin:0 auto 20px; display:flex; align-items:center; justify-content:center; font-size:45px; cursor:pointer; border:4px solid #000; box-shadow: 0 0 20px rgba(0,255,225,0.2);">👤</div>
            <h2 id="display-name">Serega</h2>
            <button class="btn-opt" style="text-align:center; color:var(--neon); border-color:var(--neon);" onclick="let n = prompt('Новый ник:'); if(n) updateNick(n)">Сменить ник</button>
            <button class="btn-opt" onclick="alert('Регистрация скоро будет доступна!')">Регистрация аккаунта</button>
            <a href="mailto:ddevelop859@gmail.com" class="btn-opt" style="display:block; text-decoration:none;">Написать разработчику</a>
            <button class="btn-opt" style="background:#fff; color:#000; font-weight:bold; text-align:center;">Войти через Google</button>
        </div>
    </div>

    <div class="nav-bar">
        <button class="nav-btn active" onclick="switchTab('scr-chats', this)"><i>💬</i>Чаты</button>
        <button class="nav-btn" onclick="switchTab('scr-profile', this)"><i>👤</i>Профиль</button>
    </div>
</div>

<div id="chat-detail" style="position:fixed; inset:0; background:var(--bg); z-index:300; display:none; flex-direction:column;">
    <div class="header">
        <button onclick="closeChat()" style="background:none; border:none; color:var(--neon); font-size:24px;">←</button>
        <b id="chat-title">Чат</b>
        <div style="color:#00ff00; font-size:10px;">в сети</div>
    </div>
    <div id="chat-window"></div>
    <div class="input-area">
        <button onclick="document.getElementById('f-up').click()" style="background:none; border:none; font-size:22px;">📎</button>
        <button id="voice-btn" style="background:none; border:none; font-size:22px;">🎤</button>
        <input id="m-inp" placeholder="Сообщение...">
        <button onclick="sendMsg()" style="background:var(--neon); border:none; width:45px; height:45px; border-radius:50%; font-size:20px;">➤</button>
    </div>
</div>

<div id="sett-modal" class="modal" onclick="closeModal('sett-modal')">
    <div class="modal-box" onclick="event.stopPropagation()">
        <h3 style="color:var(--neon); margin:0 0 20px 0;">Настройки Tanson</h3>
        
        <div style="margin-bottom:15px;">
            <small style="color:#555;">Статус</small>
            <button class="btn-opt" onclick="this.innerText = this.innerText == 'В сети' ? 'Не в сети' : 'В сети'">В сети</button>
        </div>

        <div style="margin-bottom:15px;">
            <small style="color:#555;">Секретный режим (автоудаление)</small>
            <select class="btn-opt" id="burn-timer" style="appearance:none;">
                <option value="0">Выключено</option>
                <option value="5">5 секунд</option>
                <option value="60">1 минута</option>
                <option value="86400">24 часа</option>
            </select>
        </div>

        <button onclick="localStorage.clear(); location.reload();" style="width:100%; padding:15px; background:#ff0055; border:none; border-radius:12px; color:#fff; font-weight:bold; margin-top:10px;">Выйти</button>
    </div>
</div>

<input type="file" id="f-up" style="display:none">
<audio id="radio-player" src="https://europaplus.hostingradio.ru:8014/ep128.mp3"></audio>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    const S_URL = 'https://yialdvgdpuazzedpxozc.supabase.co';
    const S_KEY = 'sb_publishable_obvuV6Of_iUSWBy6phzv5w_eSQl0YYt'; 
    const sb = supabase.createClient(S_URL, S_KEY);

    let user = localStorage.getItem("tanson_user") || "Serega";
    document.getElementById('display-name').innerText = user;

    // Splash Screen
    setTimeout(() => {
        document.getElementById('splash').style.opacity = '0';
        setTimeout(() => {
            document.getElementById('splash').style.display = 'none';
            document.getElementById('main-app').style.display = 'flex';
        }, 500);
    }, 3000);

    function switchTab(id, btn) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }

    function openChat(name) {
        document.getElementById('chat-detail').style.display = 'flex';
        document.getElementById('chat-title').innerText = name;
        loadMsgs();
    }

    function closeChat() { document.getElementById('chat-detail').style.display = 'none'; }
    function openModal(id) { document.getElementById(id).style.display = 'flex'; }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }

    function toggleRadio() {
        const p = document.getElementById('radio-player');
        const b = document.getElementById('radio-btn');
        if(p.paused) { p.play(); b.innerText = '⏸️'; b.style.color = 'var(--neon)'; }
        else { p.pause(); b.innerText = '📻'; b.style.color = '#fff'; }
    }

    async function loadMsgs() {
        const { data } = await sb.from('messages').select('*').order('created_at', {ascending:true});
        const win = document.getElementById('chat-window');
        win.innerHTML = '';
        if(data) data.forEach(m => {
            const isMe = m.user_id === user;
            const div = document.createElement('div');
            div.className = `msg ${isMe ? 'me' : ''}`;
            div.innerHTML = `<div class="msg-info">${m.user_id}</div>${m.text}`;
            win.appendChild(div);
        });
        win.scrollTop = win.scrollHeight;
    }

    async function sendMsg() {
        const i = document.getElementById('m-inp');
        if(!i.value.trim()) return;
        const msgText = i.value;
        i.value = '';
        
        await sb.from('messages').insert([{ text: msgText, user_id: user, channel: 'global' }]);
        loadMsgs();

        // Логика автоудаления
        const timer = document.getElementById('burn-timer').value;
        if(timer > 0) {
            setTimeout(async () => {
                // Здесь можно добавить логику удаления из БД по ID
                loadMsgs();
            }, timer * 1000);
        }
    }

    function updateNick(n) {
        user = n;
        localStorage.setItem("tanson_user", n);
        document.getElementById('display-name').innerText = n;
    }
</script>
</body>
</html>
