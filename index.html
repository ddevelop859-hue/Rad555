<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tanson Platinum</title>
    <style>
        :root { --neon: #00ffe1; --pink: #ff00ff; --gold: #c69c6d; --bg: #050510; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; margin: 0; height: 100vh; overflow: hidden; }
        
        /* ЗАСТАВКА */
        #splash { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #splash img { width: 120px; margin-bottom: 30px; filter: drop-shadow(0 0 10px var(--gold)); }
        .loader-bar { width: 200px; height: 3px; background: #222; border-radius: 5px; overflow: hidden; }
        .loader-fill { width: 0%; height: 100%; background: var(--gold); animation: load 2.5s forwards; }
        @keyframes load { to { width: 100%; } }

        /* ГЛАВНЫЙ КОНТЕЙНЕР */
        #main-app { display: none; height: 100vh; flex-direction: column; }
        .header { background: #000; padding: 12px 15px; border-bottom: 1px solid var(--neon); display: flex; justify-content: space-between; align-items: center; }
        
        .screen { display: none; flex: 1; overflow-y: auto; padding-bottom: 80px; }
        .screen.active { display: flex; flex-direction: column; }

        /* ОКНО ЧАТА */
        #chat-window { flex: 1; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 10px 14px; border-radius: 15px; max-width: 80%; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); }
        .me { align-self: flex-end; border-color: var(--neon); background: rgba(0,255,225,0.1); }

        /* ВВОД (Закреплен над навигацией) */
        .input-area { position: fixed; bottom: 70px; left: 0; right: 0; background: #000; padding: 10px; border-top: 1px solid #222; display: flex; gap: 8px; z-index: 100; }
        #m-inp { flex: 1; background: #111; border: 1px solid #333; color: #fff; padding: 12px; border-radius: 25px; outline: none; }

        /* НИЖНЯЯ ПАНЕЛЬ */
        .nav-bar { position: fixed; bottom: 0; left: 0; right: 0; height: 70px; background: #000; border-top: 1px solid #333; display: flex; justify-content: space-around; align-items: center; z-index: 200; }
        .nav-btn { background: none; border: none; color: #555; display: flex; flex-direction: column; align-items: center; font-size: 10px; gap: 4px; }
        .nav-btn.active { color: var(--neon); }
        .nav-btn i { font-size: 20px; font-style: normal; }

        .circle-btn { width: 44px; height: 44px; border-radius: 50%; border: none; background: var(--neon); color: #000; display: flex; align-items: center; justify-content: center; }
        
        /* ПРОФИЛЬ */
        .avatar-box { width: 100px; height: 100px; border-radius: 50%; background: var(--neon); margin: 30px auto; overflow: hidden; border: 3px solid var(--neon); display: flex; align-items: center; justify-content: center; font-size: 40px; }
        .prof-btn { width: 85%; margin: 10px auto; padding: 12px; border-radius: 10px; border: 1px solid #333; background: none; color: #fff; text-align: center; }

        /* МОДАЛКИ */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000; align-items: center; justify-content: center; }
        .modal-box { background: #111; padding: 25px; border-radius: 20px; border: 1px solid var(--neon); width: 80%; }
    </style>
</head>
<body>

<div id="splash">
    <img src="https://img.icons8.com/ios-filled/100/c69c6d/lion.png" alt="Lion">
    <div class="loader-bar"><div class="loader-fill"></div></div>
</div>

<div id="main-app">
    <div id="scr-chats" class="screen active">
        <div class="header">
            <b style="color:var(--neon)">TANSON</b>
            <button onclick="document.getElementById('sett-modal').style.display='flex'" style="background:none; border:none; color:var(--neon); font-size:20px;">⚙️</button>
        </div>
        <div style="padding:15px;">
            <div onclick="openChat('global')" style="background:rgba(255,255,255,0.05); padding:20px; border-radius:15px; border:1px solid var(--neon);">
                🌍 <b>Общий Чат</b>
            </div>
        </div>
    </div>

    <div id="scr-contacts" class="screen">
        <div class="header"><b>Контакты</b></div>
        <div style="padding:20px; color:#666; text-align:center;">Список пуст</div>
    </div>

    <div id="scr-profile" class="screen">
        <div class="header"><b>Профиль</b></div>
        <div class="avatar-box">👤</div>
        <h2 style="text-align:center;" id="user-name">User</h2>
        <div class="prof-btn" style="background:var(--neon); color:#000; font-weight:bold;">Регистрация</div>
        <a href="mailto:ddevelop859@gmail.com" class="prof-btn" style="display:block; text-decoration:none;">Написать разработчику</a>
        <div class="prof-btn" style="background:#fff; color:#000;">Войти через Google</div>
    </div>

    <div class="nav-bar">
        <button class="nav-btn active" onclick="switchTab('scr-chats', this)"><i>💬</i>Чаты</button>
        <button class="nav-btn" onclick="switchTab('scr-contacts', this)"><i>👥</i>Друзья</button>
        <button class="nav-btn" onclick="switchTab('scr-profile', this)"><i>👤</i>Профиль</button>
    </div>
</div>

<div id="chat-detail" style="position:fixed; inset:0; background:var(--bg); z-index:300; display:none; flex-direction:column;">
    <div class="header">
        <button onclick="this.parentElement.parentElement.style.display='none'" style="background:none; border:none; color:var(--neon); font-size:24px;">←</button>
        <b id="chat-title">Чат</b>
        <div style="width:30px;"></div>
    </div>
    <div id="chat-window"></div>
    <div class="input-area">
        <button class="circle-btn" style="background:none; border:1px solid var(--neon); color:var(--neon);" onclick="document.getElementById('f-up').click()">📎</button>
        <button id="voice-btn" class="circle-btn" style="background:none; border:1px solid var(--pink); color:var(--pink);">🎤</button>
        <input id="m-inp" placeholder="Сообщение...">
        <button class="circle-btn" onclick="sendMsg('text')">➤</button>
    </div>
</div>

<div id="sett-modal" class="modal" onclick="this.style.display='none'">
    <div class="modal-box" onclick="event.stopPropagation()">
        <h3 style="color:var(--neon); margin-top:0;">Настройки</h3>
        <p>Статус: <span style="color:var(--neon)">в сети</span></p>
        <p>Черный список</p>
        <p style="color:var(--pink)">Секретный режим</p>
        <button onclick="localStorage.clear(); location.reload();" style="width:100%; padding:10px; background:#ff0055; border:none; border-radius:10px; color:#fff;">Выйти</button>
    </div>
</div>

<input type="file" id="f-up" style="display:none" accept="image/*" onchange="upFile(this.files[0])">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    const S_URL = 'https://yialdvgdpuazzedpxozc.supabase.co';
    const S_KEY = 'sb_publishable_obvuV6Of_iUSWBy6phzv5w_eSQl0YYt'; 
    const sb = supabase.createClient(S_URL, S_KEY);

    let user = localStorage.getItem("tanson_user") || prompt("Твой ник:");
    if(user) {
        localStorage.setItem("tanson_user", user);
        document.getElementById('user-name').innerText = user;
    }

    // Запуск приложения после заставки
    setTimeout(() => {
        document.getElementById('splash').style.display = 'none';
        document.getElementById('main-app').style.display = 'flex';
    }, 2800);

    function switchTab(id, btn) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }

    function openChat(name) {
        document.getElementById('chat-detail').style.display = 'flex';
        document.getElementById('chat-title').innerText = name;
        loadMsgs();
    }

    // --- ЛОГИКА SUPABASE (Не изменял то что просил) ---
    async function loadMsgs() {
        const { data } = await sb.from('messages').select('*').order('created_at', {ascending:true});
        const win = document.getElementById('chat-window');
        win.innerHTML = '';
        if(data) data.forEach(m => {
            const div = document.createElement('div');
            div.className = `msg ${m.user_id === user ? 'me' : ''}`;
            div.innerHTML = `<small style="color:var(--neon); font-size:9px;">${m.user_id}</small><br>${m.text || ''}`;
            if(m.type === 'voice') div.innerHTML += `<audio src="${m.file_url}" controls></audio>`;
            win.appendChild(div);
        });
        win.scrollTop = win.scrollHeight;
    }

    async function sendMsg(t, url=null) {
        const i = document.getElementById('m-inp');
        if(!i.value.trim() && !url) return;
        await sb.from('messages').insert([{ text: i.value, user_id: user, type: t, file_url: url, channel: 'global' }]);
        i.value = '';
        loadMsgs();
    }

    // Голос и Фото (как было)
    async function upFile(f) {
        const n = `img_${Date.now()}`;
        const { data } = await sb.storage.from('uploads').upload(n, f);
        if(data) {
            const { data: { publicUrl } } = sb.storage.from('uploads').getPublicUrl(n);
            sendMsg('image', publicUrl);
        }
    }
</script>
</body>
</html>
